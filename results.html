<!doctype html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Results</title><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><style>body{background:#111;color:#f5f5f5;font-family:Arial;padding:16px}.card{background:#181818;border:2px solid #1cecf4;box-shadow:8px 8px 0 #ff40ae;padding:12px;margin:10px 0}.btn{background:#1cecf4;color:#111;border:0;padding:8px 10px;font-weight:900}</style></head><body><button class='btn' id='backBoard'>쿠지판으로 돌아가기</button> <button class='btn' onclick="location.href='index.html'">메인으로</button> <button class='btn' id='csvBtn'>전체 CSV 다운로드</button><h2>전체 결과</h2><div id='summary'></div><div id='all'></div><script>const SUPABASE_URL='여기에 입력';const SUPABASE_ANON_KEY='여기에 입력';const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);const board_id=new URLSearchParams(location.search).get('board_id');backBoard.onclick=()=>location.href='board.html?id='+board_id;let rows=[];function csv(d){const h=['opened_at','nickname','position','number','reward','custom_number','product_name'];const body=d.map(r=>h.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(','));return [h.join(','),...body].join('\n')}csvBtn.onclick=()=>{const blob=new Blob(['\uFEFF'+csv(rows)],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='results.csv';a.click()};(async()=>{const {data,error}=await supabase.from('kuji_results').select('*').eq('board_id',board_id).order('opened_at',{ascending:true});if(error)return alert(error.message);rows=data||[];const by={};rows.forEach(r=>{const k=r.nickname||'익명';(by[k]=by[k]||[]).push(r)});summary.innerHTML=Object.entries(by).map(([nick,list])=>{const win=list.filter(v=>v.number!==0).length;const dd=list.length-win;const prizes=[...new Set(list.filter(v=>v.number!==0).map(v=>v.product_name||v.reward).filter(Boolean))].join(', ');return `<div class='card' onclick="location.href='user.html?board_id=${board_id}&nickname=${encodeURIComponent(nick)}'" style='cursor:pointer'><b>${nick}</b><div>총 오픈 수: ${list.length}</div><div>당첨 수: ${win}</div><div>DDONG 수: ${dd}</div><div>당첨 상품 요약: ${prizes||'-'}</div></div>`}).join('')||'<div class="card">결과 없음</div>';all.innerHTML=rows.map(r=>`<div class='card'>${new Date(r.opened_at).toLocaleString()} | ${r.nickname} | ${r.position}번 | ${r.custom_number||r.number} | ${r.product_name||r.reward}</div>`).join('')})();</script></body></html>
