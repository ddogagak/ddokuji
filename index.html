<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>DDOKUJI BOARDS</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;background:#111;color:#f5f5f5;font-family:Arial}.wrap{padding:16px}.btn{background:#ff4fb5;color:#111;border:0;padding:10px 12px;font-weight:900;cursor:pointer}.btn2{background:#1cecf4;color:#111}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.card{background:#181818;border:2px solid #1cecf4;box-shadow:8px 8px 0 #ff40ae;padding:12px}</style></head><body><div class="wrap"><h1>쿠지판 목록</h1><button class="btn" id="newBtn">새 쿠지판 만들기</button> <button class="btn btn2" id="importBtn" style="display:none">기존 쿠지판 가져오기</button><div id="list" class="grid" style="margin-top:12px"></div></div><script>const SUPABASE_URL="여기에 입력";const SUPABASE_ANON_KEY="여기에 입력";const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);const STORAGE_KEY='offline_kuji_state_v18';const defaultState={slotCount:30,numberPool:5,columns:10,rewards:{},slots:Array.from({length:30},(_,i)=>({position:i+1,number:0,opened:false,openedBy:'',openedAt:''})),logs:[],queue:[],prizeImage:''};function stats(s){const t=s.slots?.length||0,o=(s.slots||[]).filter(v=>v.opened).length;return[t,o,t-o]}async function load(){const {data,error}=await supabase.from('kuji_boards').select('*').eq('status','active').order('updated_at',{ascending:false});if(error)return alert(error.message);const list=document.getElementById('list');if(!data.length){list.innerHTML='<div class="card">아직 쿠지판이 없어</div>';return;}list.innerHTML=data.map(b=>{const [t,o,r]=stats(b.state||{});return `<div class='card'><h3>${b.title}</h3><div>생성일: ${new Date(b.created_at).toLocaleString()}</div><div>수정일: ${new Date(b.updated_at).toLocaleString()}</div><div>총 칸 수:${t} / 오픈:${o} / 남은 수:${r}</div><div>상태:${b.status}</div><div style='margin-top:8px;display:flex;gap:6px;flex-wrap:wrap'><button class='btn2' onclick="location.href='board.html?id=${b.id}'">열기</button><button class='btn2' onclick="location.href='results.html?board_id=${b.id}'">전체 결과</button><button class='btn2' onclick="renameBoard('${b.id}','${b.title.replace(/'/g,"\\'")}')">이름변경</button><button class='btn2' onclick="cloneBoard('${b.id}')">복제</button><button class='btn2' onclick="deleteBoard('${b.id}')">삭제</button></div></div>`}).join('')}async function newBoard(state){const title=prompt('쿠지판 제목을 입력해줘');if(!title)return;const {data,error}=await supabase.from('kuji_boards').insert({title,state:state||defaultState,status:'active'}).select('id').single();if(error)return alert(error.message);location.href='board.html?id='+data.id}newBtn.onclick=()=>newBoard();async function renameBoard(id,t){const n=prompt('새 이름',t);if(!n)return;const {error}=await supabase.from('kuji_boards').update({title:n,updated_at:new Date().toISOString()}).eq('id',id);if(error)alert(error.message);else load()}async function deleteBoard(id){if(!confirm('삭제할까?'))return;const {error}=await supabase.from('kuji_boards').update({status:'deleted',updated_at:new Date().toISOString()}).eq('id',id);if(error)alert(error.message);else load()}async function cloneBoard(id){const {data,error}=await supabase.from('kuji_boards').select('*').eq('id',id).single();if(error)return alert(error.message);const keep=confirm('결과/오픈상태까지 그대로 복제할까요?');const s=JSON.parse(JSON.stringify(data.state||defaultState));if(!keep){s.logs=[];(s.slots||[]).forEach(v=>{v.opened=false;v.openedBy='';v.openedAt=''})}const {error:err}=await supabase.from('kuji_boards').insert({title:data.title+' (복제)',state:s,status:'active'});if(err)alert(err.message);else load()}if(localStorage.getItem(STORAGE_KEY)){importBtn.style.display='inline-block';importBtn.onclick=()=>newBoard(JSON.parse(localStorage.getItem(STORAGE_KEY)))}window.renameBoard=renameBoard;window.cloneBoard=cloneBoard;window.deleteBoard=deleteBoard;load();</script></body></html>
