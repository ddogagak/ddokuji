<!doctype html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>User Results</title><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><style>body{background:#111;color:#f5f5f5;font-family:Arial;padding:16px}.card{background:#181818;border:2px solid #1cecf4;box-shadow:8px 8px 0 #ff40ae;padding:12px;margin:10px 0}.win{border-color:#ff4fb5}.lose{border-color:#1cecf4}.btn{background:#1cecf4;color:#111;border:0;padding:8px 10px;font-weight:900}</style></head><body><button class='btn' id='toResults'>전체 결과로</button> <button class='btn' id='toBoard'>쿠지판으로</button> <button class='btn' onclick="location.href='index.html'">메인으로</button> <button class='btn' id='csvBtn'>CSV 다운로드</button><h2 id='title'></h2><div id='sum' class='card'></div><div id='list'></div><script>const SUPABASE_URL='https://txcdfbvcwjazatbfstak.supabase.co';const SUPABASE_ANON_KEY='sb_publishable_coRT89OfO2B31KcbO3DaBw_Z8ccF1uT';const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);const p=new URLSearchParams(location.search);const board_id=p.get('board_id');const nickname=decodeURIComponent(p.get('nickname')||'');toResults.onclick=()=>location.href='results.html?board_id='+board_id;toBoard.onclick=()=>location.href='board.html?id='+board_id;title.textContent='사용자: '+nickname;let rows=[];csvBtn.onclick=()=>{const h=['opened_at','nickname','position','number','reward','custom_number','product_name'];const c=[h.join(',')].concat(rows.map(r=>h.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+c],{type:'text/csv'}));a.download='user_results.csv';a.click()};(async()=>{const {data,error}=await supabase.from('kuji_results').select('*').eq('board_id',board_id).eq('nickname',nickname).order('opened_at',{ascending:true});if(error)return alert(error.message);rows=data||[];const win=rows.filter(v=>v.number!==0).length;sum.innerHTML=`총 오픈 수: ${rows.length}<br>당첨 수: ${win}<br>DDONG 수: ${rows.length-win}`;list.innerHTML=rows.map(r=>`<div class='card ${r.number===0?'lose':'win'}'>${new Date(r.opened_at).toLocaleString()} | 선택 번호 ${r.position} | 상품번호 ${r.custom_number||r.number} | 상품명 ${r.product_name||r.reward}</div>`).join('')||'<div class="card">기록 없음</div>'})();</script></body></html>
